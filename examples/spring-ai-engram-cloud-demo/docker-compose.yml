services:
  engram:
    image: ghcr.io/jamjet-labs/engram-server:0.5.0
    container_name: engram-demo
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - ENGRAM_MODE=rest
      - ENGRAM_PORT=8001
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8001/health"]
      interval: 2s
      timeout: 1s
      retries: 15
      start_period: 5s
    restart: unless-stopped
